<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Control Console</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --bg-base: #080c14;
            --bg-panel: #0f1524;
            --bg-surface: #141c2f;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-focus: #2563eb;
            
            --neon-cyan: #06b6d4;
            --neon-emerald: #10b981;
            --neon-alert: #ef4444;
            
            --text-main: #f8fafc;
            --text-muted: #64748b;
            
            --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }

        .console-container {
            width: 94%;
            max-width: 1280px;
            height: 88vh;
            max-height: 88vh; 
            background-color: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            display: grid;
            grid-template-columns: 340px 1fr;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden; 
        }

        /* PANEL IZQUIERDO */
        .sidebar-panel {
            background-color: rgba(10, 15, 26, 0.4);
            border-right: 1px solid var(--border-subtle);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0; 
        }

        .brand-section h2 {
            margin: 0 0 4px 0;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .brand-section p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .meta-divider {
            height: 1px;
            background: linear-gradient(90deg, var(--border-subtle) 0%, rgba(0,0,0,0) 100%);
            margin: 1.5rem 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-grow: 1;
            margin-top: 1rem;
            min-height: 0;
        }

        .control-block label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .config-bar input {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: var(--font-mono);
            outline: none;
            transition: all 0.2s ease;
        }

        .config-bar input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .telemetry-card {
            background-color: rgba(20, 28, 47, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .status-container {
            text-align: center;
        }

        .status-indicator {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mic-button {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mic-button:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .mic-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .mic-button.listening {
            background-color: var(--neon-alert);
            border-color: var(--neon-alert);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: pulse 1.8s infinite linear;
        }

        /* PANEL DERECHO */
        .main-chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0; 
            overflow: hidden;
            background-color: rgba(13, 19, 32, 0.2);
        }

        .chat-body {
            flex: 1;
            padding: 2rem;
            overflow-y: auto; 
            min-height: 0;    
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
        }

        .bubble {
            max-width: 85%; 
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.1px;
            word-wrap: break-word;
            white-space: pre-wrap; 
            box-sizing: border-box;
            animation: buildUp 0.25s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .bubble.user {
            background-color: var(--bg-surface);
            color: var(--text-main);
            align-self: flex-end;
            border: 1px solid var(--border-subtle);
            border-bottom-right-radius: 2px;
        }

        .bubble.ai {
            background-color: rgba(37, 99, 235, 0.07);
            color: #e2e8f0;
            align-self: flex-start;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-bottom-left-radius: 2px;
        }

        /* BARRA INFERIOR DE CONTROLES */
        .chat-footer {
            padding: 1.5rem 2rem 2rem 2rem;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0; 
        }

        .input-row {
            display: flex;
            gap: 14px;
            width: 100%;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background-color: var(--bg-base);
            border: 1px solid var(--border-subtle);
            color: white;
            padding: 14px 22px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus:not(:disabled) {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 1px var(--border-focus);
        }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: rgba(0, 0, 0, 0.2);
        }

        .send-button {
            background-color: var(--border-focus);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .send-button:hover:not(:disabled) {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .send-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* NUEVO BOTÓN DE STOP */
        .stop-button {
            background-color: var(--neon-alert);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .stop-button:hover {
            background-color: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes buildUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="console-container">
        <div class="sidebar-panel">
            <div class="brand-section">
                <h2>Control Console</h2>
                <p>Environment v2.6 // Sync Mode</p>
                <div class="meta-divider"></div>
            </div>

            <div class="control-group">
                <div class="control-block">
                    <label>Target Endpoint</label>
                    <div class="config-bar">
                        <input type="text" id="webhookUrl" placeholder="https://tu-instancia.n8n.cloud/..." value="http://localhost:5678/webhook-test/...">
                    </div>
                </div>

                <div class="control-block" style="margin-top: auto;">
                    <label>Voice Stream Infrastructure</label>
                    <div class="telemetry-card">
                        <button id="micBtn" class="mic-button">🎤</button>
                        <div class="status-container">
                            <div id="statusLabel" class="status-indicator">STANDBY</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-chat-panel">
            <div class="chat-body" id="chatBody">
                <div class="bubble ai">🛡️ Modo síncrono activado. Mientras esté hablando, la consola de texto se bloqueará temporalmente. Usa el botón rojo de detener (⏹) si necesitas interrumpirme para enviar un nuevo comando de inmediato.</div>
            </div>

            <div class="chat-footer">
                <div class="input-row">
                    <input type="text" id="textInput" class="chat-input" placeholder="Ingrese una línea de comando o consulta de datos...">
                    <button id="sendBtn" class="send-button">➤</button>
                    <button id="stopBtn" class="stop-button">⏹</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioOut" hidden></audio>

    <script>
        const webhookInput = document.getElementById('webhookUrl');
        const chatBody = document.getElementById('chatBody');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const micBtn = document.getElementById('micBtn');
        const statusLabel = document.getElementById('statusLabel');
        const audioOut = document.getElementById('audioOut');

        // Función para restaurar la interfaz a su estado normal
        function desbloquearInterfaz() {
            textInput.disabled = false;
            sendBtn.disabled = false;
            micBtn.disabled = false;
            textInput.placeholder = "Ingrese una línea de comando o consulta de datos...";
            sendBtn.style.display = 'flex';
            stopBtn.style.display = 'none';
            statusLabel.textContent = "STANDBY";
            textInput.focus();
        }

        // Función para bloquear mientras procesa la petición de n8n
        function bloquearParaProcesar() {
            textInput.disabled = true;
            sendBtn.disabled = true;
            micBtn.disabled = true;
            textInput.placeholder = "Procesando datos en el servidor...";
            statusLabel.textContent = "PROCESANDO...";
        }

        async function procesarMensaje(mensaje) {
            if (!mensaje.trim()) return;
            const webhookUrl = webhookInput.value.trim();
            
            if (!webhookUrl) {
                alert("Por favor, ingresa la URL de tu Webhook en la parte superior del panel izquierdo.");
                return;
            }

            appendBubble(mensaje, 'user');
            bloquearParaProcesar();

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje: mensaje })
                });

                if (response.ok) {
                    const data = await response.json(); 

                    if (data.respuestaTexto) {
                        appendBubble(data.respuestaTexto, 'ai');
                    }

                    if (data.audio) {
                        audioOut.src = "data:audio/mpeg;base64," + data.audio;
                        audioOut.play().catch(e => {
                            console.error("Error al reproducir audio:", e);
                            desbloquearInterfaz(); // Desbloquea si falla el play
                        });
                        // Nota: El evento 'play' del audio se encarga de cambiar el estado visual
                    } else {
                        // Si n8n solo devuelve texto sin audio, liberamos de inmediato
                        desbloquearInterfaz();
                    }
                    
                } else {
                    appendBubble("❌ Error en el servidor de automatización.", 'ai');
                    desbloquearInterfaz();
                }
            } catch (error) {
                appendBubble("❌ Error de conexión con el Webhook.", 'ai');
                console.error(error);
                desbloquearInterfaz();
            }
        }

        sendBtn.addEventListener('click', () => {
            procesarMensaje(textInput.value);
            textInput.value = '';
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !textInput.disabled) {
                procesarMensaje(textInput.value);
                textInput.value = '';
            }
        });

        // --- CONTROL DE AUDIO Y BOTÓN STOP ---

        // Cuando el audio arranca, bloquea todo y muestra el botón de Stop
        audioOut.addEventListener('play', () => {
            textInput.disabled = true;
            micBtn.disabled = true;
            textInput.placeholder = "🔊 IA hablando... Presiona detener (⏹) para interrumpir.";
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            statusLabel.textContent = "REPRODUCIENDO...";
        });

        // Cuando el audio termina naturalmente, libera la interfaz
        audioOut.addEventListener('ended', () => {
            desbloquearInterfaz();
        });

        // Acción de matar el audio manualmente
        stopBtn.addEventListener('click', () => {
            audioOut.pause();
            audioOut.currentTime = 0; // Reinicia el audio a 0
            desbloquearInterfaz();
            
            // Opcional: Feedback visual de que lo paraste
            const bubble = document.createElement('div');
            bubble.style.textAlign = 'center';
            bubble.style.color = 'var(--text-muted)';
            bubble.style.fontSize = '0.75rem';
            bubble.style.margin = '10px 0';
            bubble.textContent = "— Reproducción interrumpida —";
            chatBody.appendChild(bubble);
            chatBody.scrollTop = chatBody.scrollHeight;
        });

        // --- MOTOR DE VOZ ---
        const SpeechSetup = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechSetup) {
            statusLabel.textContent = "SISTEMA NO SOPORTADO";
        } else {
            const recognition = new SpeechSetup();
            recognition.lang = 'es-CO'; 
            recognition.continuous = false; 
            recognition.interimResults = false; 

            let isListening = false; 

            micBtn.addEventListener('click', () => {
                if (micBtn.disabled) return;
                
                if (isListening) {
                    recognition.stop();
                } else {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.error("Error al arrancar reconocimiento:", e);
                    }
                }
            });

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusLabel.textContent = "ESCUCHANDO...";
                textInput.placeholder = "Habla ahora, te estoy escuchando...";
            };

            recognition.onresult = (event) => {
                const textoEscuchado = event.results[0][0].transcript;
                
                if (textoEscuchado.trim()) {
                    textInput.value = textoEscuchado;
                    procesarMensaje(textoEscuchado);
                    textInput.value = '';
                }
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                
                // Solo restaurar el placeholder si no estamos esperando a n8n
                if (statusLabel.textContent === "ESCUCHANDO...") {
                    desbloquearInterfaz();
                }
            };

            recognition.onerror = (event) => {
                isListening = false;
                micBtn.classList.remove('listening');
                
                if (event.error === 'not-allowed') {
                    statusLabel.textContent = "PERMISO DENEGADO";
                    alert("Acceso al micrófono denegado. Por favor, haz clic en el candado al lado de la URL y actívalo.");
                    desbloquearInterfaz();
                } else if (event.error === 'no-speech') {
                    desbloquearInterfaz();
                } else {
                    console.error("Speech Recognition Error Técnico:", event.error);
                    desbloquearInterfaz();
                }
            };
        }

        function appendBubble(text, sender) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble', sender);
            bubble.textContent = text;
            chatBody.appendChild(bubble);
            chatBody.scrollTop = chatBody.scrollHeight; 
        }
    </script>
</body>
</html>
